name: Test FreeBSD Port Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build on FreeBSD
    steps:
      - uses: actions/checkout@v4

      - name: Build tun2socks port on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          prepare: |
            pkg install -y go

          run: |
            set -ex

            echo "==> FreeBSD version"
            freebsd-version
            go version

            echo "==> Fetching ports tree Mk framework"
            fetch -o /tmp/ports.tar.gz \
              "https://github.com/freebsd/freebsd-ports/archive/refs/heads/main.tar.gz"
            mkdir -p /usr/ports
            tar xzf /tmp/ports.tar.gz -C /usr/ports \
              --include="freebsd-ports-main/Mk/*" \
              --include="freebsd-ports-main/Templates/*" \
              --include="freebsd-ports-main/Keywords/*" \
              --strip-components=1
            rm /tmp/ports.tar.gz

            echo "==> Installing port files"
            mkdir -p /usr/ports/net/tun2socks
            cp /home/runner/work/tun2socks-freebsd-port/tun2socks-freebsd-port/Makefile \
               /usr/ports/net/tun2socks/
            cp /home/runner/work/tun2socks-freebsd-port/tun2socks-freebsd-port/pkg-descr \
               /usr/ports/net/tun2socks/
            echo "==> Generating distinfo"
            cd /usr/ports/net/tun2socks
            make makesum
            echo "===== distinfo ====="
            cat distinfo
            echo "===== end distinfo ====="

            echo "==> Building port"
            make DISABLE_VULNERABILITIES=yes stage

            echo "==> Checking plist"
            make check-plist

            echo "==> Verifying binary"
            ls -la work/stage/usr/local/bin/tun2socks
            file work/stage/usr/local/bin/tun2socks
            work/stage/usr/local/bin/tun2socks --version || true

            echo "==> Creating package"
            make package

            echo "==> Build successful!"

  generate-patch:
    runs-on: ubuntu-latest
    name: Generate submission patch
    steps:
      - uses: actions/checkout@v4

      - name: Clone FreeBSD ports tree (sparse) and generate patch
        run: |
          set -ex

          echo "==> Sparse-clone FreeBSD ports tree"
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/freebsd/freebsd-ports.git /tmp/freebsd-ports
          cd /tmp/freebsd-ports
          git sparse-checkout set net

          echo "==> Add port files"
          mkdir -p net/tun2socks
          cp "$GITHUB_WORKSPACE/Makefile"  net/tun2socks/
          cp "$GITHUB_WORKSPACE/pkg-descr" net/tun2socks/
          cp "$GITHUB_WORKSPACE/distinfo"  net/tun2socks/

          echo "==> Insert SUBDIR += tun2socks into net/Makefile"
          # Insert in alphabetical order after tsocks, before tunneller
          sed -i '/SUBDIR += tsocks$/a\\tSUBDIR += tun2socks' net/Makefile

          # Verify insertion
          grep -B1 -A1 'tun2socks' net/Makefile

          echo "==> Configure git for commit"
          git config user.name "Dasun Nimantha"
          git config user.email "dasun4@pm.me"

          echo "==> Stage and commit"
          git add net/tun2socks net/Makefile
          git commit -m "net/tun2socks: add new port" -m "tun2socks creates a TUN network interface that tunnels TCP and UDP traffic through a SOCKS5, HTTP, Shadowsocks, or Relay proxy. It is powered by gVisor's userspace TCP/IP stack and supports gateway mode for transparent proxying of other devices on the network." -m "WWW: https://github.com/xjasonlyu/tun2socks"

          echo "==> Generate patch"
          git format-patch -1 HEAD -o /tmp/patch-output

          echo "==> Patch contents:"
          cat /tmp/patch-output/*.patch

          echo "==> Copy patch to workspace"
          cp /tmp/patch-output/*.patch "$GITHUB_WORKSPACE/net-tun2socks-new-port.patch"

      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: net-tun2socks-new-port-patch
          path: net-tun2socks-new-port.patch
