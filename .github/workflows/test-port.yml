name: Test FreeBSD Port Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build on FreeBSD
    steps:
      - uses: actions/checkout@v4

      - name: Build tun2socks port on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          prepare: |
            pkg install -y go

          run: |
            set -ex

            echo "==> FreeBSD version"
            freebsd-version
            go version

            echo "==> Fetching ports tree Mk framework"
            fetch -o /tmp/ports.tar.gz \
              "https://github.com/freebsd/freebsd-ports/archive/refs/heads/main.tar.gz"
            mkdir -p /usr/ports
            tar xzf /tmp/ports.tar.gz -C /usr/ports \
              --include="freebsd-ports-main/Mk/*" \
              --include="freebsd-ports-main/Templates/*" \
              --include="freebsd-ports-main/Keywords/*" \
              --strip-components=1
            rm /tmp/ports.tar.gz

            echo "==> Installing port files"
            mkdir -p /usr/ports/net/tun2socks
            cp /home/runner/work/tun2socks-freebsd-port/tun2socks-freebsd-port/Makefile \
               /usr/ports/net/tun2socks/
            cp /home/runner/work/tun2socks-freebsd-port/tun2socks-freebsd-port/pkg-descr \
               /usr/ports/net/tun2socks/
            cp /home/runner/work/tun2socks-freebsd-port/tun2socks-freebsd-port/pkg-plist \
               /usr/ports/net/tun2socks/

            echo "==> Generating distinfo"
            cd /usr/ports/net/tun2socks
            make makesum
            echo "===== distinfo ====="
            cat distinfo
            echo "===== end distinfo ====="

            echo "==> Building port"
            make DISABLE_VULNERABILITIES=yes

            echo "==> Staging"
            make stage

            echo "==> Checking plist"
            make check-plist

            echo "==> Verifying binary"
            ls -la work/stage/usr/local/bin/tun2socks
            file work/stage/usr/local/bin/tun2socks
            work/stage/usr/local/bin/tun2socks --version || true

            echo "==> Build successful!"
